# ============================================================
# Simple Web CI/CD — Flask + Docker
#
# 流水线:
#   1. validate → 安装依赖 + 运行测试
#   2. build    → 构建 Docker 镜像 + 导出 tar
#   3. deploy   → SCP 传输 tar + docker load + 启动
#
# 关键设计: 镜像在 GitHub Actions 端构建，打成 tar 传到 ECS，
#           彻底绕过 ECS 访问 Docker Hub 的问题！
# ============================================================

name: Flask CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ============================================
  # Job 1: 代码验证 + 测试
  # ============================================
  validate:
    name: "① 验证 & 测试"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行测试
        run: python -m pytest test_app.py -v

  # ============================================
  # Job 2: 构建 Docker 镜像 → 导出 tar
  # ============================================
  build:
    name: "② 构建镜像"
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: 构建 Docker 镜像
        run: docker build -t simple-web:latest .

      - name: 导出镜像为 tar
        run: docker save simple-web:latest -o /tmp/simple-web.tar

      - name: 压缩镜像（减小体积）
        run: gzip -f /tmp/simple-web.tar

      - name: 上传镜像 artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/simple-web.tar.gz
          retention-days: 1

  # ============================================
  # Job 3: 部署到阿里云 ECS
  # ============================================
  deploy:
    name: "③ 部署至 ECS"
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4

      - name: 下载镜像 artifact（放到工作区）
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: ./

      - name: 传输 compose + 镜像到服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          use_insecure_cipher: true
          source: "docker-compose.prod.yml,simple-web.tar.gz"
          target: "/opt/simple-web/"
          strip_components: 0

      - name: 加载镜像并启动服务
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          use_insecure_cipher: true
          script: |
            # SSH 非交互式 shell 需要显式 PATH
            export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/snap/bin:$PATH"

            SUDO_PASS="${{ secrets.SERVER_PASSWORD }}"

            # 用 sudo 搜索 docker 实际路径（覆盖所有可能位置）
            DOCKER_BIN=$(echo "$SUDO_PASS" | sudo -S find / -name docker -type f 2>/dev/null | grep -E "(bin|sbin)/docker$" | head -1)
            if [ -z "$DOCKER_BIN" ]; then
              # 回退尝试常见路径
              for p in /usr/local/bin/docker /usr/bin/docker /usr/sbin/docker /snap/bin/docker; do
                if echo "$SUDO_PASS" | sudo -S test -x "$p" 2>/dev/null; then
                  DOCKER_BIN="$p"
                  break
                fi
              done
            fi
            echo "docker 路径: $DOCKER_BIN"
            if [ -z "$DOCKER_BIN" ]; then
              echo "❌ 服务器上未找到 docker 可执行文件"
              echo "尝试列出 /usr/local/bin/:"
              ls -la /usr/local/bin/ 2>&1 || true
              echo "尝试列出 /usr/bin/:"
              ls -la /usr/bin/ 2>&1 || true
              exit 1
            fi

            # 测试 sudo docker 是否可用
            DOCKER_CMD="echo \"$SUDO_PASS\" | sudo -S $DOCKER_BIN"
            if eval "$DOCKER_CMD ps" > /dev/null 2>&1; then
              echo "✅ sudo docker 正常"
            else
              echo "⚠️  sudo docker 失败，尝试普通 docker"
              if $DOCKER_BIN ps > /dev/null 2>&1; then
                DOCKER_CMD="$DOCKER_BIN"
                echo "✅ 普通 docker 正常"
              else
                echo "❌ docker 完全不可用"
                eval "$DOCKER_CMD ps" 2>&1
                exit 1
              fi
            fi

            # 测试 docker compose / docker-compose
            COMPOSE_CMD="$DOCKER_CMD compose"
            if ! eval "$COMPOSE_CMD version" > /dev/null 2>&1; then
              COMPOSE_BIN=$(echo "$SUDO_PASS" | sudo -S find / -name "docker-compose*" -type f 2>/dev/null | head -1)
              if [ -n "$COMPOSE_BIN" ]; then
                COMPOSE_CMD="echo \"$SUDO_PASS\" | sudo -S $COMPOSE_BIN"
                echo "使用旧版 docker-compose: $COMPOSE_BIN"
              else
                echo "❌ 找不到 docker compose / docker-compose"
                eval "$COMPOSE_CMD version" 2>&1
                exit 1
              fi
            fi
            echo "最终使用: DOCKER=$DOCKER_CMD"
            echo "          COMPOSE=$COMPOSE_CMD"

            mkdir -p /opt/simple-web
            cd /opt/simple-web

            echo "=== [1/5] 加载 Docker 镜像 ==="
            gunzip -f simple-web.tar.gz
            eval "$DOCKER_CMD load -i simple-web.tar"
            rm -f simple-web.tar

            echo "=== [2/5] 复制 compose 文件 ==="
            cp docker-compose.prod.yml docker-compose.yml

            echo "=== [3/5] 停止旧容器 ==="
            eval "$COMPOSE_CMD down --remove-orphans" || true

            echo "=== [4/5] 启动新容器 ==="
            eval "$COMPOSE_CMD up -d"

            echo "=== [5/5] 健康检查 ==="
            sleep 3
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:80 || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ 部署成功！HTTP: $HTTP_CODE"
            else
              echo "⚠️  返回 $HTTP_CODE，查看日志："
              eval "$COMPOSE_CMD logs --tail=20"
            fi

            echo ""
            echo "=== 运行状态 ==="
            eval "$COMPOSE_CMD ps"

          

  # ============================================
  # Job 4: 通知
  # ============================================
  notify:
    name: "④ 结果通知"
    needs: [validate, build, deploy]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: 汇总
        run: |
          echo "========================================="
          echo "  CI/CD 流水线完成"
          echo "========================================="
          echo "  ① 验证测试 : ${{ needs.validate.result }}"
          echo "  ② 构建镜像 : ${{ needs.build.result }}"
          echo "  ③ 生产部署 : ${{ needs.deploy.result }}"
          echo "========================================="
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "  🌐 http://${{ secrets.SERVER_HOST }}"
          fi
