# ============================================================
# Simple Web CI/CD — Flask + Docker
#
# 流水线:
#   1. validate → 安装依赖 + 运行测试
#   2. build    → 构建 Docker 镜像 + 导出 tar
#   3. deploy   → SCP 传输 tar + docker load + 启动
#
# 关键设计: 镜像在 GitHub Actions 端构建，打成 tar 传到 ECS，
#           彻底绕过 ECS 访问 Docker Hub 的问题！
# ============================================================

name: Flask CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ============================================
  # Job 1: 代码验证 + 测试
  # ============================================
  validate:
    name: "① 验证 & 测试"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行测试
        run: python -m pytest test_app.py -v

  # ============================================
  # Job 2: 构建 Docker 镜像 → 导出 tar
  # ============================================
  build:
    name: "② 构建镜像"
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: 构建 Docker 镜像
        run: docker build -t simple-web:latest .

      - name: 导出镜像为 tar
        run: docker save simple-web:latest -o /tmp/simple-web.tar

      - name: 压缩镜像（减小体积）
        run: gzip -f /tmp/simple-web.tar

      - name: 上传镜像 artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/simple-web.tar.gz
          retention-days: 1

  # ============================================
  # Job 3: 部署到阿里云 ECS
  # ============================================
  deploy:
    name: "③ 部署至 ECS"
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4

      - name: 下载镜像 artifact（放到工作区）
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: ./

      - name: 传输 compose + 镜像到服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          use_insecure_cipher: true
          source: "docker-compose.prod.yml,simple-web.tar.gz"
          target: "/opt/simple-web/"
          strip_components: 0

      - name: 加载镜像并启动服务
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          use_insecure_cipher: true
          script: |
            # 非交互式 shell PATH 不完整，显式补齐
            export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:$PATH"
            echo "PATH=$PATH"

            # 查找 docker 可执行文件
            DOCKER_BIN=""
            for p in /usr/local/bin/docker /usr/bin/docker /snap/bin/docker; do
              if [ -x "$p" ]; then
                DOCKER_BIN="$p"
                break
              fi
            done
            if [ -z "$DOCKER_BIN" ]; then
              if command -v docker > /dev/null 2>&1; then
                DOCKER_BIN="$(command -v docker)"
              fi
            fi
            echo "docker 路径: $DOCKER_BIN"

            # 确定是否需要 sudo
            DOCKER="$DOCKER_BIN"
            if [ -n "$DOCKER_BIN" ]; then
              if ! $DOCKER ps > /dev/null 2>&1; then
                echo "尝试 sudo docker..."
                DOCKER="sudo -n $DOCKER_BIN"
                if ! $DOCKER ps > /dev/null 2>&1; then
                  echo "docker 无权限执行，尝试用 sudo -S"
                  echo "${{ secrets.SERVER_PASSWORD }}" | sudo -S $DOCKER_BIN ps > /dev/null 2>&1 && DOCKER="echo '${{ secrets.SERVER_PASSWORD }}' | sudo -S $DOCKER_BIN"
                fi
              fi
            else
              echo "❌ 服务器上未找到 docker 可执行文件"
              exit 1
            fi

            # 确定 compose 命令
            COMPOSE="$DOCKER compose"
            if ! echo "" | $COMPOSE version > /dev/null 2>&1; then
              COMPOSE_BIN=""
              for p in /usr/local/bin/docker-compose /usr/bin/docker-compose; do
                if [ -x "$p" ]; then
                  COMPOSE_BIN="$p"
                  break
                fi
              done
              if [ -n "$COMPOSE_BIN" ]; then
                COMPOSE="$COMPOSE_BIN"
                echo "使用旧版 docker-compose"
              else
                echo "❌ 服务器上找不到 docker compose 命令"
                exit 1
              fi
            fi
            echo "最终使用: $DOCKER / $COMPOSE"

            mkdir -p /opt/simple-web
            cd /opt/simple-web

            echo "=== [1/5] 加载 Docker 镜像 ==="
            gunzip -f simple-web.tar.gz
            $DOCKER load -i simple-web.tar
            rm -f simple-web.tar

            echo "=== [2/5] 复制 compose 文件 ==="
            cp docker-compose.prod.yml docker-compose.yml

            echo "=== [3/5] 停止旧容器 ==="
            eval "$COMPOSE down --remove-orphans" || true

            echo "=== [4/5] 启动新容器 ==="
            eval "$COMPOSE up -d"

            echo "=== [5/5] 健康检查 ==="
            sleep 3
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:80 || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ 部署成功！HTTP: $HTTP_CODE"
            else
              echo "⚠️  返回 $HTTP_CODE，查看日志："
              eval "$COMPOSE logs --tail=20"
            fi

            echo ""
            echo "=== 运行状态 ==="
            eval "$COMPOSE ps"

          

  # ============================================
  # Job 4: 通知
  # ============================================
  notify:
    name: "④ 结果通知"
    needs: [validate, build, deploy]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: 汇总
        run: |
          echo "========================================="
          echo "  CI/CD 流水线完成"
          echo "========================================="
          echo "  ① 验证测试 : ${{ needs.validate.result }}"
          echo "  ② 构建镜像 : ${{ needs.build.result }}"
          echo "  ③ 生产部署 : ${{ needs.deploy.result }}"
          echo "========================================="
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "  🌐 http://${{ secrets.SERVER_HOST }}"
          fi
